<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"> 
   <link rel="stylesheet" href="maket.css">
</head>
<body>
<div class="todo">
      <h2 class="title">Todo приложение</h2>
      <p class="desc">список задач на сегодня</p>

         <div class="container" >
            <div class="card">
               <ul class="card-list">
                  <li class="empty">No tasks</li>
                  <li class="items">
                     <span class="text">new task</span>
                     <div class="btn-group">
                        <button class="btn btn-success">
                           <i class="fa fa-pencil"></i>
                        </button>
                        <button class="btn btn-danger">
                           <i class="fa fa-times"></i>
                        </button>
                     </div>
                  </li>
               </ul>
            </div>
            <div class="card">
               <form id="form">
                  <input type="text" id="input" placeholder="Add a task">
                     <button type="submit" class="btn btn-primary">
                        <i class="fa fa-plus" aria-hidden="true"></i>
                     </button>
               </form>
            </div>
   </div>
   </div>

   <script src="meket.js"></script> 
</body>
</html>
